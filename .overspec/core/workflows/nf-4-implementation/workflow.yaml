workflow:
  id: feature-implementation
  name: "Feature Implementation"
  phase: implementation
  agent: howard
  required: true

  description: "Howard implements new features following Leonard's design, using atomic commits and the implementation plan."

  instructions: "instructions.md"
  template: "template.md"
  checklist: "checklist.md"

  inputs:
    - "artifacts/architecture/feature-design.md"
    - "artifacts/specification/feature-stories.md"

  output:
    path: "artifacts/implementation/feature-report.md"
    handoff_to: [amy]

  steps:
    - id: "review-design"
      action: "ask"
      prompt: "I've reviewed Leonard's design and the feature stories. Here's my implementation plan. Want to adjust the order or approach for any story?"
      required: true

    - id: "setup"
      action: "generate"
      description: "Set up the implementation environment: create feature branch, verify dependencies, confirm the safety net (backup strategy, rollback plan)."
      required: true

    - id: "implement"
      action: "generate"
      description: "Implement each story following the implementation plan. Use atomic commits (one per story). Follow existing code patterns and conventions."
      required: true

    - id: "generate"
      action: "generate"
      description: "Generate the implementation report: what was built, commits made, verification results, and any deviations from the plan."
      save_to: "artifacts/implementation/feature-report.md"

    - id: "validate"
      action: "checklist"
      checklist: "checklist.md"
