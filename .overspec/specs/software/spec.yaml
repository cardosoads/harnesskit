# =============================================================================
# OverSpec Spec — Software Development
# =============================================================================
# The default built-in spec for full-stack software development.
# Covers both greenfield (new projects) and brownfield (existing projects).
# =============================================================================

spec:
  name: software
  version: "1.0.0"
  description: "Full-stack software development spec with greenfield and brownfield support"
  domain: "software-engineering"
  author: "OverSpec Core Team"
  license: "MIT"
  overspec_min_version: "1.0.0"
  icon: "💻"
  tags: [software, development, fullstack, greenfield, brownfield]

# -----------------------------------------------------------------------------
# COMPONENTS — Agents, workflows, and templates included in this spec
# -----------------------------------------------------------------------------
components:
  agents:
    - penny.agent.yaml      # Requirements Analyst
    - leonard.agent.yaml     # Software Architect
    - howard.agent.yaml      # Developer
    - amy.agent.yaml         # Quality Reviewer
    - raj.agent.yaml         # Brownfield Analyst
  workflows:
    greenfield:
      - 1-discovery/workflow.yaml
      - 2-specification/workflow.yaml
      - 2.5-discuss/workflow.yaml
      - 3-architecture/workflow.yaml
      - 4-implementation/workflow.yaml
      - 5-review/workflow.yaml
    brownfield:
      - bf-1-analysis/workflow.yaml
      - bf-2-planning/workflow.yaml
      - bf-3-implementation/workflow.yaml
      - 5-review/workflow.yaml
  templates:
    - discovery/template.md
    - specification/template.md
    - architecture/template.md
    - implementation/template.md
    - review/template.md

# -----------------------------------------------------------------------------
# CONFIG — How this spec integrates with others
# -----------------------------------------------------------------------------
config:
  extends: "none"    # This is the base spec, doesn't extend anything
  phases_override: null

# -----------------------------------------------------------------------------
# DEPENDENCIES — External requirements
# -----------------------------------------------------------------------------
dependencies:
  specs: []          # No dependencies on other specs
  tools: []
