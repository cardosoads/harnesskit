version: 1

policy:
  description: "Minimum context that must exist before agents can work reliably."
  missing_required_file_blocks: true
  thin_context_warns: true
  unresolved_template_markers_warn: true

required_context:
  - id: project-entrypoint
    path: "CLAUDE.md"
    min_words: 80
    severity: error
    purpose: "Agent entrypoint and startup protocol."
  - id: overharness-config
    path: ".overharness/overharness.yaml"
    min_words: 80
    severity: error
    purpose: "Global OverHarness configuration."
  - id: state
    path: ".overharness/state.json"
    min_words: 20
    severity: error
    purpose: "Single source of truth for project progress."
  - id: constitution
    path: ".overharness/core/constitution.md"
    min_words: 120
    severity: error
    purpose: "Non-negotiable agent principles."
  - id: workflow-engine
    path: ".overharness/core/engine/workflow-engine.md"
    min_words: 200
    severity: error
    allow_template_markers: true
    purpose: "Workflow execution rules."
  - id: harness-contract-agent
    path: ".overharness/core/agents/leslie.agent.yaml"
    min_words: 150
    severity: error
    allow_template_markers: true
    purpose: "Agent that guides harness contract creation before implementation."
  - id: harness-contract-workflow
    path: ".overharness/core/workflows/harness-contract/workflow.yaml"
    min_words: 40
    severity: error
    allow_template_markers: true
    purpose: "Guided workflow for creating verifiable harness contracts."
  - id: state-machine
    path: ".overharness/core/engine/state-machine.md"
    min_words: 160
    severity: error
    purpose: "State transition rules."
  - id: flow-guide
    path: ".overharness/core/engine/flow-guide.md"
    min_words: 120
    severity: error
    purpose: "User-facing execution flow, CLI entrypoints, and track naming policy."
  - id: harness-guide
    path: ".overharness/harness/HARNESS.md"
    min_words: 150
    severity: error
    purpose: "Harness loop and operating rules."
  - id: sensor-policy
    path: ".overharness/harness/sensors.yaml"
    min_words: 80
    severity: error
    allow_template_markers: true
    purpose: "Feedback sensor policy."
  - id: baseline-policy
    path: ".overharness/harness/baselines/current.yaml"
    min_words: 80
    severity: warning
    allow_template_markers: true
    purpose: "Accepted baseline findings for known operational debt."
  - id: contract-template
    path: ".overharness/harness/templates/contract-template.md"
    min_words: 120
    severity: error
    allow_template_markers: true
    purpose: "Contract template for implementation work."

artifact_quality:
  state_artifact_min_words: 80
  implementation_report_requires_harness: true
  completed_step_without_artifact_severity: warning

workflow_requirements:
  implementation_workflows:
    - path: ".overharness/core/workflows/harness-contract/workflow.yaml"
      required_steps:
        - select-work
        - collect-context
        - define-scope
        - define-must-haves
        - select-sensors
        - assess-risk
        - validate
    - path: ".overharness/core/workflows/4-implementation/workflow.yaml"
      required_steps:
        - create-harness-contract
        - record-harness-sensors
    - path: ".overharness/core/workflows/bf-3-implementation/workflow.yaml"
      required_steps:
        - create-harness-contract
        - record-harness-sensors
    - path: ".overharness/core/workflows/nf-4-implementation/workflow.yaml"
      required_steps:
        - create-harness-contract
        - run-harness-sensors
