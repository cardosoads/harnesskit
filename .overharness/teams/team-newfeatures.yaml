# =============================================================================
# TEAM — New Features
# =============================================================================
# Team for adding new features to existing projects. Raj analyzes impact,
# Penny gathers requirements, Leonard designs, Howard implements, Amy reviews.
# =============================================================================

team:
  name: "New Features"
  description: "Team for adding new features to existing projects"
  icon: "✨"
  spec: "software"
  agents:
    - raj         # Impact Analysis (discovery)
    - penny       # Feature Requirements (discovery + specification)
    - leonard     # Architecture / Feature Design
    - design-specialist  # UI Design (optional phase)
    - leslie      # Harness Contract Designer
    - howard      # Developer
    - amy         # Quality Reviewer
  purpose: >
    The new-features team adds discrete features to existing projects. Raj
    scouts the codebase to understand impact, Penny gathers requirements
    and specifies stories, Leonard designs the integration, Leslie turns the
    work into a verifiable harness contract, Howard implements, and Amy
    reviews quality.
  when_to_use: "Adding new features to projects that already went through greenfield or brownfield"
  party_mode:
    enabled: true
    max_agents_per_turn: 3
