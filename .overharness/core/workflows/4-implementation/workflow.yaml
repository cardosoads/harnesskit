workflow:
  id: project-setup
  name: "Set Up Project Structure"
  phase: implementation
  agent: howard
  required: true

  description: "Guides the user through setting up the project structure, dependencies, and tooling based on the architecture document"

  instructions: "instructions.md"
  template: "template.md"
  checklist: "checklist.md"

  inputs:
    - "artifacts/architecture/architecture.md"

  output:
    path: "artifacts/implementation/setup-report.md"
    handoff_to: [amy]

  steps:
    - id: "review-arch"
      action: "ask"
      prompt: "I've reviewed the architecture. Let me confirm the tech stack with you: [show stack from architecture]. Is this correct?"
      required: true

    - id: "project-structure"
      action: "ask"
      prompt: "Based on the architecture, here's the proposed folder structure. Any adjustments?"
      required: true

    - id: "dependencies"
      action: "ask"
      prompt: "These are the core dependencies I'll set up. Any additions or removals?"
      required: true

    - id: "dev-environment"
      action: "ask"
      prompt: "Any specific dev environment requirements? (Docker, env vars, etc.)"
      required: false

    - id: "coding-standards"
      action: "ask"
      prompt: "Any coding standards or conventions to follow? (linting, naming, etc.)"
      required: false

    - id: "create-harness-contract"
      action: "generate"
      description: "Create a harness contract in .overharness/harness/contracts/active/ using .overharness/harness/templates/contract-template.md. Define must-haves, expected files, sensors, risk level, out-of-scope items, and exit criteria for the setup work."
      required: true

    - id: "record-harness-sensors"
      action: "generate"
      description: "Read .overharness/harness/sensors.yaml and identify which sensors apply to this setup work. Record required and recommended sensor evidence for the setup report. If a required sensor cannot run, document the reason and stop for user approval before marking the workflow complete."
      required: true

    - id: "generate"
      action: "generate"
      description: "Generate the setup report based on the collected responses, harness contract, and sensor evidence"
      save_to: "artifacts/implementation/setup-report.md"

    - id: "validate"
      action: "checklist"
      checklist: "checklist.md"
